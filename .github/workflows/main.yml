name: UPS Token Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - name: Get UPS OAuth Token
        id: ups_auth
        run: |
          RESPONSE=$(curl -s -X POST "https://onlinetools.ups.com/security/v1/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -u "${{ secrets.UPS_CLIENT_ID }}:${{ secrets.UPS_CLIENT_SECRET }}" \
            -d "grant_type=client_credentials")
          
          echo "Response: $RESPONSE"
          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          echo "Token fetched successfully"
